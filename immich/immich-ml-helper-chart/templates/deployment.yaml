apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich-ml.fullname" . }}
  labels:
    {{- include "immich-ml.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "immich-ml.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich-ml.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: machine-learning
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          {{- with .Values.env }}
          env:
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: model-cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "immich-ml.fullname" . }}-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
