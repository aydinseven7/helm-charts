## Image parameters

## Immich server image repository
## Immich server image tag
## Check https://github.com/immich-app/immich/releases for available tags.
##
image:
  repository: ghcr.io/immich-app/immich-server
  tag: "v2.6.3"

## External dependency parameters

## Kubernetes DNS name of the PostgreSQL Service
## Must match the Service name of your PostgreSQL deployment in the same namespace.
## If you used the companion database chart with release name "immich", the
## Service will be named "immich-db".
##
databaseHost: "immich-db"

## Kubernetes DNS name of the Redis Service
## If you installed Redis via the Bitnami chart, the default Service name is "redis-master".
##
redisHost: "redis-master"

## Name of the PostgreSQL database Immich should connect to
##
databaseName: immich

## PostgreSQL credential parameters
##
## Credentials are read from a pre-existing Kubernetes Secret so that
## plaintext passwords never appear in values files or Helm releases.
##
## Create the Secret before installing this chart:
##   kubectl create secret generic postgres-secret \
##     --from-literal=username=immich \
##     --from-literal=password=changeme
##

## Name of the Secret containing the PostgreSQL username
## Key within the Secret that holds the username value
##
postgresUser:
  secretName: postgres-secret
  key: username

## Name of the Secret containing the PostgreSQL password
## Key within the Secret that holds the password value
##
postgresPassword:
  secretName: postgres-secret
  key: password

## Immich environment parameters

env:
  ## Path inside the container where uploaded media is stored
  ## Must match the mountPath of the upload PersistentVolumeClaim.
  uploadLocation: /usr/src/app/upload
  ## Log verbosity level
  ## One of: verbose | debug | log | warn | error
  loglevel: log

## Persistence parameters

persistence:
  ## Enable a PersistentVolumeClaim for uploaded media
  enabled: true
  ## StorageClass for the upload PVC ("" uses the cluster default)
  storageClass: ""
  ## PVC access mode
  accessMode: ReadWriteOnce
  ## Size of the upload PVC
  ## Scale based on your library. 50Gi suits a small personal library;
  ## larger collections (>50k photos) may need 200Gi+.
  size: 50Gi

## Service parameters

service:
  ## Kubernetes Service type
  ## Use ClusterIP when exposing via Ingress; LoadBalancer for a direct external IP.
  type: ClusterIP
  ## Service port
  port: 80
  ## Port Immich listens on inside the container
  targetPort: 2283

## Resource parameters

## CPU and memory requests and limits
##
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 2Gi
  # requests:
  #   cpu: 10m
  #   memory: 25Mi

## Scheduling parameters

## Node labels for pod assignment
## Leave empty ({}) to allow scheduling on any node.
## e.g.:
##   nodeSelector:
##     node-role: app
##
nodeSelector: {}

## Affinity for pod assignment
## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
## e.g. prefer not to co-locate the server and ML pods on the same node:
##   affinity:
##     podAntiAffinity:
##       preferredDuringSchedulingIgnoredDuringExecution:
##         - weight: 1
##           podAffinityTerm:
##             labelSelector:
##               matchLabels:
##                 app.kubernetes.io/component: machine-learning
##             topologyKey: kubernetes.io/hostname
##
affinity: {}

## Tolerations for pod scheduling
## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
## e.g.:
##   tolerations:
##     - key: "dedicated"
##       operator: "Equal"
##       value: "immich"
##       effect: "NoSchedule"
##
tolerations: []

## Machine Learning parameters

machineLearning:
  ## Deploy the Machine Learning sidecar
  ## Provides CLIP smart search and facial recognition.
  ## Disable if your nodes lack the resources or you prefer to run ML separately
  ## via the companion immich-ml-helper-chart.
  ##
  enabled: true

  ## ML container image repository
  ## ML container image tag
  ##
  image:
    repository: ghcr.io/immich-app/immich-machine-learning
    tag: "v2.6.3"

  ## Extra environment variables for the ML container
  ## Provide as a map of key/value pairs.
  ##
  env: {}

  ## Node labels for ML pod assignment
  ## Machine learning workloads require amd64 by default. Adjust or remove for arm64 clusters.
  ## e.g.:
  ##   nodeSelector:
  ##     kubernetes.io/arch: amd64
  ##
  nodeSelector: {}

  ## Affinity for ML pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
  ## e.g. require scheduling onto nodes labelled for ML workloads:
  ##   affinity:
  ##     nodeAffinity:
  ##       requiredDuringSchedulingIgnoredDuringExecution:
  ##         nodeSelectorTerms:
  ##           - matchExpressions:
  ##               - key: workload-type
  ##                 operator: In
  ##                 values:
  ##                   - ml
  ##
  affinity: {}

  ## Tolerations for ML pod scheduling
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  ## e.g. allow scheduling onto a GPU-tainted node:
  ##   tolerations:
  ##     - key: "nvidia.com/gpu"
  ##       operator: "Exists"
  ##       effect: "NoSchedule"
  ##
  tolerations: []

  ## Enable a PersistentVolumeClaim for the model cache
  ## Without persistence, models are re-downloaded on every restart (~2–5 Gi).
  ## StorageClass for the model-cache PVC ("" uses the cluster default)
  ## PVC access mode
  ## Size of the model-cache PVC
  ##
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi

  ## CPU and memory requests and limits for the ML container
  ##
  resources: {}
    # limits:
    #   cpu: "2"
    #   memory: 4Gi
    # requests:
    #   cpu: 10m
    #   memory: 25Mi

## Ingress parameters

ingress:
  ## Enable an Ingress resource
  ## Requires an Ingress controller installed in the cluster (e.g. ingress-nginx).
  ##
  enabled: false

  ## IngressClass to use
  ## Run `kubectl get ingressclass` to list available classes.
  ##
  ingressClassName: "nginx"

  ## Additional annotations for the Ingress resource
  ## Annotations are controller-specific. Examples:
  ##
  ## ingress-nginx:
  ##   nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  ##   nginx.ingress.kubernetes.io/proxy-body-size: 4G
  ##
  ## Cloudflare Tunnel + external-dns:
  ##   external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  ##   external-dns.alpha.kubernetes.io/hostname: immich.example.com
  ##   external-dns.alpha.kubernetes.io/target: <tunnel-id>.cfargotunnel.com
  ##
  annotations: {}

  ## Hostname at which Immich will be served
  ##
  host: immich.example.com

  ## Path prefix for the Immich Ingress rule
  ##
  path: /

  ## TLS configuration for the Ingress resource
  ## Leave empty if your proxy (e.g. Cloudflare) handles TLS termination upstream.
  ## To use cert-manager:
  ##   tls:
  ##     - secretName: immich-tls
  ##       hosts:
  ##         - immich.example.com
  ##
  tls: []
