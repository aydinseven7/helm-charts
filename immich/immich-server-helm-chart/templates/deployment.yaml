apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich-server.fullname" . }}
  labels:
    {{- include "immich-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "immich-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: immich-server
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: IMMICH_LOG_LEVEL
              value: {{ .Values.env.loglevel }}
            - name: DB_HOSTNAME
              value: {{ .Values.databaseHost }}
            - name: REDIS_HOSTNAME
              value: {{ .Values.redisHost }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresUser.secretName }}
                  key: {{ .Values.postgresUser.key }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresPassword.secretName }}
                  key: {{ .Values.postgresPassword.key }}
            - name: DB_DATABASE_NAME
              value: {{ .Values.databaseName }}
          ports:
            - containerPort: 2283
          volumeMounts:
            - name: upload-data
              mountPath: {{ .Values.env.uploadLocation }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: {{ include "immich-server.fullname" . }}-pvc
