{{- if and .Values.machineLearning.enabled .Values.machineLearning.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immich-server.fullname" . }}-ml-pvc
  labels:
    {{- include "immich-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: machine-learning
spec:
  accessModes:
    - {{ .Values.machineLearning.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.machineLearning.persistence.size }}
  storageClassName: {{ .Values.machineLearning.persistence.storageClass }}
{{- end }}
